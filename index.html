<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProLogic IQ Test</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>
<body>
    <div class="container" id="game-container">
        <div id="start-screen">
            <h1>ProLogic IQ</h1>
            <p>Challenge your pattern recognition. <br>Speed increases your final score.</p>
            <button class="btn" onclick="startGame()">Begin Assessment</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="quiz-header">
                <span id="question-counter">Question 1/10</span>
                <span id="timer">Time: 20s</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div id="question-container" class="fade-in">
                <div class="question-text" id="question-text"></div>
                <div class="options-grid" id="options-container"></div>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h1>Assessment Finalized</h1>
            <div class="score-circle">
                <span id="final-score">0</span>
            </div>
            <p id="feedback-text"></p>
            <button class="btn" onclick="startGame()">Try Again</button>
        </div>
    </div>
</body>
</html>
